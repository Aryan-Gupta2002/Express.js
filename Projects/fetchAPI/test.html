<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello</h1>
    <div id="posts"></div>
    <script>
        async function getRecentPosts() {
            console.log("Before sending fetch request");
            const response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
            const data = await response.json();
            console.log("After sending fetch request");
            // Now putting data into html frontend
            document.getElementById('posts').innerHTML=data.body;
            // data.body will only give only the body key's value, to get whole object or JSON, we use JSON.stringify(data);
            document.getElementById('posts').innerHTML=JSON.stringify(data);
        }
        getRecentPosts();
        // OR, we could use Axios externel library
        // in Axios, instead of fetch we use axios.get("URL");
        // in Axios, file is auto converted to JSON, unlike in fetch, we do not need to do it explicitly
    </script>

</body>
</html>
